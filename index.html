<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolsHub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
  background:#0f172a;
  color:#fff;
}

/* TOP + BOTTOM SPACE (EMPTY FOR ADS) */
.top-ad{
  height:80px;
  margin:10px 20px;
}

.bottom-ad{
  height:90px;
  margin:20px;
}

/* HEADER */
header{
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:600;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
  padding:20px;
}

/* CARDS */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  background:#334155;
}

.card span{
  font-size:14px;
  opacity:0.8;
}

/* TOOL AREA */
.container{
  padding:20px;
  display:flex;
  justify-content:center;
}

.tool-box{
  width:100%;
  max-width:500px;
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  display:none;
}

/* INPUT */
input,button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#3b82f6;
  color:white;
  cursor:pointer;
}

canvas{
  max-width:100%;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="top-ad"></div>

<header>⚡ ToolsHub Pro</header>

<div class="grid">
  <div class="card" onclick="openTool('resize')">📏<br><span>Resize</span></div>
  <div class="card" onclick="openTool('convert')">🔄<br><span>JPG→PNG</span></div>
  <div class="card" onclick="openTool('compress')">🗜️<br><span>Compress</span></div>
  <div class="card" onclick="openTool('rotate')">🔁<br><span>Rotate</span></div>
  <div class="card" onclick="openTool('gray')">⚫<br><span>Grayscale</span></div>
  <div class="card" onclick="openTool('text')">✍️<br><span>Add Text</span></div>
</div>

<div class="container">

<!-- RESIZE -->
<div id="resize" class="tool-box">
<h3>Resize Image</h3>
<input type="file" id="rInput">
<input id="rw" placeholder="Width">
<input id="rh" placeholder="Height">
<button onclick="resize()">Process</button>
<canvas id="rCanvas"></canvas>
</div>

<!-- CONVERT -->
<div id="convert" class="tool-box">
<h3>JPG → PNG</h3>
<input type="file" id="cInput">
<button onclick="convert()">Convert</button>
<canvas id="cCanvas"></canvas>
</div>

<!-- COMPRESS -->
<div id="compress" class="tool-box">
<h3>Compress</h3>
<input type="file" id="cpInput">
<button onclick="compress()">Compress</button>
<canvas id="cpCanvas"></canvas>
</div>

<!-- ROTATE -->
<div id="rotate" class="tool-box">
<h3>Rotate</h3>
<input type="file" id="roInput">
<button onclick="rotate()">Rotate</button>
<canvas id="roCanvas"></canvas>
</div>

<!-- GRAYSCALE -->
<div id="gray" class="tool-box">
<h3>Grayscale</h3>
<input type="file" id="gInput">
<button onclick="gray()">Apply</button>
<canvas id="gCanvas"></canvas>
</div>

<!-- TEXT -->
<div id="text" class="tool-box">
<h3>Add Text</h3>
<input type="file" id="tInput">
<input id="txt" placeholder="Enter text">
<button onclick="addText()">Apply</button>
<canvas id="tCanvas"></canvas>
</div>

</div>

<div class="bottom-ad"></div>

<script>
function openTool(id){
document.querySelectorAll('.tool-box').forEach(t=>t.style.display='none');
document.getElementById(id).style.display='block';
}

function process(id,callback){
let file=document.getElementById(id+'Input').files[0];
let reader=new FileReader();
reader.onload=e=>{
let img=new Image();
img.onload=()=>callback(img);
img.src=e.target.result;
}
reader.readAsDataURL(file);
}

function resize(){
process('r',img=>{
let c=rCanvas,ctx=c.getContext('2d');
c.width=rw.value;c.height=rh.value;
ctx.drawImage(img,0,0,rw.value,rh.value);
});
}

function convert(){
process('c',img=>{
let c=cCanvas,ctx=c.getContext('2d');
c.width=img.width;c.height=img.height;
ctx.drawImage(img,0,0);
});
}

function compress(){
process('cp',img=>{
let c=cpCanvas,ctx=c.getContext('2d');
c.width=img.width;c.height=img.height;
ctx.drawImage(img,0,0);
});
}

function rotate(){
process('ro',img=>{
let c=roCanvas,ctx=c.getContext('2d');
c.width=img.height;c.height=img.width;
ctx.translate(c.width/2,c.height/2);
ctx.rotate(Math.PI/2);
ctx.drawImage(img,-img.width/2,-img.height/2);
});
}

function gray(){
process('g',img=>{
let c=gCanvas,ctx=c.getContext('2d');
c.width=img.width;c.height=img.height;
ctx.drawImage(img,0,0);
let d=ctx.getImageData(0,0,c.width,c.height);
for(let i=0;i<d.data.length;i+=4){
let avg=(d.data[i]+d.data[i+1]+d.data[i+2])/3;
d.data[i]=d.data[i+1]=d.data[i+2]=avg;
}
ctx.putImageData(d,0,0);
});
}

function addText(){
process('t',img=>{
let c=tCanvas,ctx=c.getContext('2d');
c.width=img.width;c.height=img.height;
ctx.drawImage(img,0,0);
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText(txt.value,20,40);
});
}
</script>

</body>
</html>
