<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToolsHub Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{background:#0f172a;color:#fff;}

.top-ad{height:80px;margin:10px 20px;}
.bottom-ad{height:90px;margin:20px;}

header{text-align:center;font-size:24px;font-weight:600;margin:10px 0;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:#334155;
}

.card span{font-size:14px;opacity:0.8;}

.container{
padding:20px;
display:flex;
justify-content:center;
}

.tool-box{
width:100%;
max-width:500px;
background:#1e293b;
padding:25px;
border-radius:15px;
display:none;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

canvas{max-width:100%;margin-top:10px;}
</style>
</head>

<body>

<div class="top-ad"></div>

<header>⚡ ToolsHub Pro</header>

<div class="grid">
  <div class="card" onclick="openTool('resize')">📏<br><span>Resize</span></div>
  <div class="card" onclick="openTool('convert')">🔄<br><span>JPG→PNG</span></div>
  <div class="card" onclick="openTool('compress')">🗜️<br><span>Compress</span></div>
  <div class="card" onclick="openTool('rotate')">🔁<br><span>Rotate</span></div>
  <div class="card" onclick="openTool('gray')">⚫<br><span>Grayscale</span></div>
  <div class="card" onclick="openTool('text')">✍️<br><span>Add Text</span></div>
</div>

<div class="container">

<div id="resize" class="tool-box">
<h3>Resize Image</h3>
<input type="file" id="rInput">
<input id="rw" placeholder="Width">
<input id="rh" placeholder="Height">
<button onclick="resize()">Process</button>
<canvas id="rCanvas"></canvas>
</div>

<div id="convert" class="tool-box">
<h3>JPG → PNG</h3>
<input type="file" id="cInput">
<button onclick="convert()">Convert</button>
<canvas id="cCanvas"></canvas>
</div>

<div id="compress" class="tool-box">
<h3>Compress</h3>
<input type="file" id="cpInput">
<button onclick="compress()">Compress</button>
<canvas id="cpCanvas"></canvas>
</div>

<div id="rotate" class="tool-box">
<h3>Rotate</h3>
<input type="file" id="roInput">
<button onclick="rotate()">Rotate</button>
<canvas id="roCanvas"></canvas>
</div>

<div id="gray" class="tool-box">
<h3>Grayscale</h3>
<input type="file" id="gInput">
<button onclick="gray()">Apply</button>
<canvas id="gCanvas"></canvas>
</div>

<div id="text" class="tool-box">
<h3>Add Text</h3>
<input type="file" id="tInput">
<input id="txt" placeholder="Enter text">
<button onclick="addText()">Apply</button>
<canvas id="tCanvas"></canvas>
</div>

</div>

<div class="bottom-ad"></div>

<script>
function openTool(id){
document.querySelectorAll('.tool-box').forEach(t=>t.style.display='none');
document.getElementById(id).style.display='block';
}

function resize(){
let file=document.getElementById("rInput").files[0];
let w=document.getElementById("rw").value;
let h=document.getElementById("rh").value;

let reader=new FileReader();
reader.onload=function(e){
let img=new Image();
img.onload=function(){
let c=document.getElementById("rCanvas");
let ctx=c.getContext("2d");
c.width=w;c.height=h;
ctx.drawImage(img,0,0,w,h);
}
img.src=e.target.result;
}
reader.readAsDataURL(file);
}

function convert(){
let file=document.getElementById("cInput").files[0];
let reader=new FileReader();
reader.onload=function(e){
let img=new Image();
img.onload=function(){
let c=document.getElementById("cCanvas");
let ctx=c.getContext("2d");
c.width=img.width;c.height=img.height;
ctx.drawImage(img,0,0);
}
img.src=e.target.result;
}
reader.readAsDataURL(file);
}

function compress(){
let file=document.getElementById("cpInput").files[0];
let reader=new FileReader();
reader.onload=function(e){
let img=new Image();
img.onload=function(){
let c=document.getElementById("cpCanvas");
let ctx=c.getContext("2d");
c.width=img.width;c.height=img.height;
ctx.drawImage(img,0,0);
}
img.src=e.target.result;
}
reader.readAsDataURL(file);
}

function rotate(){
let file=document.getElementById("roInput").files[0];
let reader=new FileReader();
reader.onload=function(e){
let img=new Image();
img.onload=function(){
let c=document.getElementById("roCanvas");
let ctx=c.getContext("2d");
c.width=img.height;c.height=img.width;
ctx.translate(c.width/2,c.height/2);
ctx.rotate(Math.PI/2);
ctx.drawImage(img,-img.width/2,-img.height/2);
}
img.src=e.target.result;
}
reader.readAsDataURL(file);
}

function gray(){
let file=document.getElementById("gInput").files[0];
let reader=new FileReader();
reader.onload=function(e){
let img=new Image();
img.onload=function(){
let c=document.getElementById("gCanvas");
let ctx=c.getContext("2d");
c.width=img.width;c.height=img.height;
ctx.drawImage(img,0,0);
let d=ctx.getImageData(0,0,c.width,c.height);
for(let i=0;i<d.data.length;i+=4){
let avg=(d.data[i]+d.data[i+1]+d.data[i+2])/3;
d.data[i]=d.data[i+1]=d.data[i+2]=avg;
}
ctx.putImageData(d,0,0);
}
img.src=e.target.result;
}
reader.readAsDataURL(file);
}

function addText(){
let file=document.getElementById("tInput").files[0];
let text=document.getElementById("txt").value;

let reader=new FileReader();
reader.onload=function(e){
let img=new Image();
img.onload=function(){
let c=document.getElementById("tCanvas");
let ctx=c.getContext("2d");
c.width=img.width;c.height=img.height;
ctx.drawImage(img,0,0);
ctx.fillStyle="white";
ctx.font="30px Arial";
ctx.fillText(text,20,40);
}
img.src=e.target.result;
}
reader.readAsDataURL(file);
}
</script>

</body>
</html>
