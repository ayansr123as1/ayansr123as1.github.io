<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7988764823800661"
     crossorigin="anonymous"></script>

<title>ToolsHub Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:#fff;
}

/* HEADER */
header{
text-align:center;
font-size:34px;
padding:25px;
font-weight:700;
background:linear-gradient(90deg,#3b82f6,#06b6d4);
-webkit-background-clip:text;
color:transparent;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:18px;
padding:25px;
}

/* CARD */
.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.1);
padding:22px;
border-radius:18px;
text-align:center;
cursor:pointer;
transition:0.3s;
font-weight:500;
}

.card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

/* TOOL BOX */
.container{
display:flex;
justify-content:center;
padding:20px;
}

.tool-box{
width:100%;
max-width:650px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
padding:25px;
border-radius:20px;
display:none;
}

/* INPUT */
input,textarea,select,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

button{
background:linear-gradient(90deg,#3b82f6,#06b6d4);
color:#fff;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

canvas{width:100%;margin-top:10px}
</style>
</head>

<body>

<header>⚡ ToolsHub Pro</header>

<div class="grid">
<div class="card" onclick="openTool('resize')">📏 Resize</div>
<div class="card" onclick="openTool('convert')">🔄 Convert</div>
<div class="card" onclick="openTool('rotate')">🔁 Rotate</div>
<div class="card" onclick="openTool('gray')">⚫ Grayscale</div>
<div class="card" onclick="openTool('crop')">✂️ Crop</div>
<div class="card" onclick="openTool('text')">✍️ Text</div>
<div class="card" onclick="openTool('qr')">📱 QR</div>
<div class="card" onclick="openTool('password')">🔐 Password</div>
<div class="card" onclick="openTool('word')">📝 Word Count</div>
<div class="card" onclick="openTool('reverse')">🔁 Reverse</div>
<div class="card" onclick="openTool('random')">🎲 Random</div>
</div>

<div class="container">

<!-- RESIZE -->
<div id="resize" class="tool-box">
<h3>Resize</h3>
<input type="file" id="rInput">
<input id="rw" placeholder="Width">
<input id="rh" placeholder="Height">
<button onclick="resize()">Process</button>
<canvas id="rCanvas"></canvas>
</div>

<!-- CONVERT -->
<div id="convert" class="tool-box">
<h3>JPG → PNG</h3>
<input type="file" id="cInput">
<button onclick="convert()">Convert</button>
<canvas id="cCanvas"></canvas>
</div>

<!-- ROTATE -->
<div id="rotate" class="tool-box">
<h3>Rotate</h3>
<input type="file" id="roInput">
<button onclick="rotate()">Rotate</button>
<canvas id="roCanvas"></canvas>
</div>

<!-- GRAY -->
<div id="gray" class="tool-box">
<h3>Grayscale</h3>
<input type="file" id="gInput">
<button onclick="gray()">Apply</button>
<canvas id="gCanvas"></canvas>
</div>

<!-- CROP -->
<div id="crop" class="tool-box">
<h3>Crop</h3>
<input type="file" id="crInput">
<input id="cx" placeholder="X">
<input id="cy" placeholder="Y">
<input id="cw" placeholder="Width">
<input id="ch" placeholder="Height">
<button onclick="crop()">Crop</button>
<canvas id="crCanvas"></canvas>
</div>

<!-- TEXT -->
<div id="text" class="tool-box">
<h3>Add Text</h3>
<input type="file" id="tInput">
<input id="txt" placeholder="Text">
<input type="color" id="color">
<input id="size" placeholder="Font size">
<input id="x" placeholder="X position">
<input id="y" placeholder="Y position">
<button onclick="addText()">Apply</button>
<canvas id="tCanvas"></canvas>
</div>

<!-- QR -->
<div id="qr" class="tool-box">
<h3>QR Generator</h3>
<input id="qrText">
<button onclick="qr()">Generate</button>
<div id="qrOut"></div>
</div>

<!-- PASSWORD -->
<div id="password" class="tool-box">
<h3>Password Generator</h3>
<input id="len" placeholder="Length">
<button onclick="passGen()">Generate</button>
<input id="pass">
</div>

<!-- WORD COUNT -->
<div id="word" class="tool-box">
<h3>Word Count</h3>
<textarea id="wc"></textarea>
<button onclick="count()">Count</button>
<input id="out">
</div>

<!-- REVERSE -->
<div id="reverse" class="tool-box">
<h3>Reverse Text</h3>
<input id="rev">
<button onclick="reverse()">Reverse</button>
<input id="revOut">
</div>

<!-- RANDOM -->
<div id="random" class="tool-box">
<h3>Random Number</h3>
<input id="min">
<input id="max">
<button onclick="randomNum()">Generate</button>
<input id="randOut">
</div>

</div>

<script>
function openTool(id){
document.querySelectorAll('.tool-box').forEach(t=>t.style.display='none');
document.getElementById(id).style.display='block';
}

function load(id,cb){
let f=document.getElementById(id+'Input').files[0];
if(!f){alert('Select image');return;}
let r=new FileReader();
r.onload=e=>{
let i=new Image();
i.onload=()=>cb(i);
i.src=e.target.result;
}
r.readAsDataURL(f);
}

function resize(){
load('r',i=>{
let c=rCanvas,ctx=c.getContext('2d');
c.width=rw.value;c.height=rh.value;
ctx.drawImage(i,0,0,rw.value,rh.value);
});
}

function convert(){
load('c',i=>{
let c=cCanvas,ctx=c.getContext('2d');
c.width=i.width;c.height=i.height;
ctx.drawImage(i,0,0);
});
}

function rotate(){
load('ro',i=>{
let c=roCanvas,ctx=c.getContext('2d');
c.width=i.height;c.height=i.width;
ctx.translate(c.width/2,c.height/2);
ctx.rotate(Math.PI/2);
ctx.drawImage(i,-i.width/2,-i.height/2);
});
}

function gray(){
load('g',i=>{
let c=gCanvas,ctx=c.getContext('2d');
c.width=i.width;c.height=i.height;
ctx.drawImage(i,0,0);
let d=ctx.getImageData(0,0,c.width,c.height);
for(let x=0;x<d.data.length;x+=4){
let a=(d.data[x]+d.data[x+1]+d.data[x+2])/3;
d.data[x]=d.data[x+1]=d.data[x+2]=a;
}
ctx.putImageData(d,0,0);
});
}

function crop(){
load('cr',i=>{
let c=crCanvas,ctx=c.getContext('2d');
c.width=cw.value;c.height=ch.value;
ctx.drawImage(i,cx.value,cy.value,cw.value,ch.value,0,0,cw.value,ch.value);
});
}

function addText(){
load('t',i=>{
let c=tCanvas,ctx=c.getContext('2d');
c.width=i.width;c.height=i.height;
ctx.drawImage(i,0,0);
ctx.fillStyle=color.value;
ctx.font=(size.value||30)+'px Arial';
ctx.fillText(txt.value,x.value||20,y.value||40);
});
}

function qr(){
qrOut.innerHTML=`<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${qrText.value}">`;
}

function passGen(){
let l=len.value||8,s="abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",p="";
for(let i=0;i<l;i++)p+=s[Math.floor(Math.random()*s.length)];
pass.value=p;
}

function count(){
out.value=wc.value.split(/\\s+/).length;
}

function reverse(){
revOut.value=rev.value.split('').reverse().join('');
}

function randomNum(){
let a=parseInt(min.value)||0,b=parseInt(max.value)||100;
randOut.value=Math.floor(Math.random()*(b-a+1))+a;
}
</script>

</body>
</html>
